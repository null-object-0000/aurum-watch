services:
  aurum-watch:
    image: ${APP_IMAGE:-aurum-watch:local}
    build: .
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      - AKTOOLS_BASE_URL=http://aktools:8080
    depends_on:
      - aktools
    volumes:
      - aurum-data:/app/data

  aktools:
    image: ghcr.io/akfamily/aktools:latest
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  aurum-data:
